<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" sizes="64x64" href="logo-touro-64.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="logo-touro-180.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="logo-touro.png">
<link rel="shortcut icon" href="logo-touro.png">
<link rel="apple-touch-icon" href="logo-touro.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0A192F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Terrae Aegis">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrae Aegis | Holding Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        :root {
            --azul-profundo: #0A192F;
            --dourado-fosco: #C5A059;
            --dourado-brilhante: #FFD700;
            --branco-marfum: #E6E6E6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--azul-profundo);
            color: var(--branco-marfum);
            overflow-x: hidden;
        }

        /* BARRA DA TRINDADE */
        .barra-trindade {
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(10, 25, 47, 0.95);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            position: fixed;
            top: 0; z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .item-trindade-container { padding: 15px 20px; cursor: pointer; }
        .item-trindade {
            font-size: 0.75em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dourado-brilhante);
            font-weight: bold;
        }

        .divisor-trindade { color: var(--dourado-brilhante); padding-top: 13px; opacity: 0.8; }

        /* MOLDURA TRINDADE */
        .moldura-texto {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border: 1px solid var(--dourado-fosco);
            display: none;
            background: rgba(10, 25, 47, 0.90);
            text-align: center;
            z-index: 1500;
        }

        /* MOLDURA SETORES */
        .moldura-setor {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 80%;
            max-width: 1000px;
            border: 1px solid var(--dourado-fosco); box-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
            display: none;
            background: rgba(10, 25, 47, 0.95);
            z-index: 3000;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .fechar-moldura {
            position: absolute;
            top: 10px;
            right: 15px;
            color: var(--dourado-fosco);
            cursor: pointer;
            font-size: 1.5em;
            line-height: 1;
            z-index: 3100;
        }

        .iframe-setor {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        .titulo-moldura {
            color: var(--dourado-fosco);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: block;
        }
        #escrita { font-style: italic; line-height: 1.6; color: var(--branco-marfum); font-size: 1.1em; }

        /* LOGIN MINIMALISTA */
        .login-topo-minimalista {
            position: absolute;
            top: 65px;
            right: 5%;
            width: 22%;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }
        .titulo-login {
            color: var(--dourado-fosco);
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 2px solid var(--dourado-fosco);
            padding-left: 8px;
        }
        .login-topo-minimalista input {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            color: var(--branco-marfum);
            font-size: 0.7em;
            padding: 6px;
            outline: none;
        }
        .login-topo-minimalista button {
            background: var(--dourado-fosco);
            color: var(--azul-profundo);
            border: none;
            padding: 8px;
            font-size: 0.65em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-recuperar {
            font-size: 0.55em;
            color: var(--dourado-fosco);
            text-decoration: none;
            text-align: right;
            opacity: 0.7;
            cursor: pointer;
        }

        header { padding: 100px 5% 10px; display: flex; flex-direction: column; align-items: center; }
        .logo img { height: 280px; width: auto; max-width: 95%; margin-bottom: 20px; }

        .setores-operacionais { display: flex; justify-content: center; gap: 12px; padding: 20px 5% 20px; flex-wrap: wrap; }
        .setor-card { flex: 1; min-width: 160px; max-width: 220px; height: 60px; border: 1px solid rgba(197, 160, 89, 0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; text-transform: uppercase; font-size: 0.8em; letter-spacing: 2px; color: var(--dourado-fosco); transition: 0.3s; }

        /* HERO - ORÁCULO COM COMPLEMENTO */
        .hero { padding: 20px 10% 40px; text-align: center; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #oraculo-container {
            max-width: 900px;
            opacity: 0;
            display: none;
        }

        .frase-mae {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 1.8em;
            letter-spacing: 1px;
            line-height: 1.4;
            background: linear-gradient(180deg, #FFFFFF 0%, #D1D1D1 50%, #AFAFAF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .complemento-filho {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1em;
            color: var(--dourado-fosco);
            letter-spacing: 1px;
            opacity: 0.8;
            font-weight: 300;
        }

        @keyframes cortinaRevelacao {
            from { clip-path: inset(0 100% 0 0); opacity: 1; }
            to { clip-path: inset(0 0 0 0); opacity: 1; }
        }

        @keyframes fadeOutLento {
            from { opacity: 1; filter: blur(0px); }
            to { opacity: 0; filter: blur(10px); }
        }

        .animar-entrada { display: block !important; animation: cortinaRevelacao 2s ease-out forwards; }
        .animar-saida { display: block !important; animation: fadeOutLento 2.5s ease-in forwards; }

        .footer { padding: 40px 10%; border-top: 1px solid rgba(197, 160, 89, 0.3); }
        .form-contato { max-width: 600px; margin: 0 auto; }
        .form-contato input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; box-sizing: border-box; outline: none; }
        
        .iti { width: 100%; margin-bottom: 15px; }

        .assinatura-dev {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 0.6em;
            color: #C0C0C0;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .frase-mae { font-size: 1.3em; }
            .complemento-filho { font-size: 0.9em; }
            .hero { min-height: 250px; }
            .login-topo-minimalista { position: relative; top: 80px; width: 90%; right: auto; margin: 0 auto; }
            .item-trindade-container { padding: 15px 8px; }
            .item-trindade { font-size: 0.65em; letter-spacing: 1px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="barra-trindade">
        <div class="item-trindade-container" onclick="escrever('seguranca', 'SEGURANÇA')"><span class="item-trindade">Segurança</span></div>
        <span class="divisor-trindade">|</span>
        <div class="item-trindade-container" onclick="escrever('financas', 'FINANÇAS')"><span class="item-trindade">Finanças</span></div>
        <span class="divisor-trindade">|</span>
        <div class="item-trindade-container" onclick="escrever('governanca', 'GOVERNANÇA')"><span class="item-trindade">Governança</span></div>
    </nav>

    <div class="login-topo-minimalista">
        <div class="titulo-login">Área Restrita Login</div>
        <input type="email" id="email_restrito" placeholder="E-MAIL">
        <input type="text" id="token_restrito" placeholder="TOKEN">
        <button onclick="validarTokenRestrito()">Acessar</button>
        <a class="btn-recuperar" onclick="recuperarToken()">Esqueci meu Token</a>
    </div>

    <div id="moldura" class="moldura-texto">
        <span class="fechar-moldura" onclick="fecharMoldura()">×</span>
        <span id="titulo-moldura" class="titulo-moldura"></span>
        <div id="escrita"></div>
    </div>

    <div id="molduraSetor" class="moldura-setor">
        <span class="fechar-moldura" onclick="fecharSetor()">×</span>
        <iframe id="iframeSetor" class="iframe-setor"></iframe>
    </div>

    <header>
        <div class="logo"><img src="logo-touro.png" alt="Terrae Aegis"></div>
    </header>

    <section class="setores-operacionais">
        <div class="setor-card" onclick="abrirSetor('agro/index.html')">Agro</div>
        <div class="setor-card" onclick="abrirSetor('Mineracao/index.html')">Mineração</div>
        <div class="setor-card" onclick="abrirSetor('industria/index.html')">Indústria</div>
        <div class="setor-card" onclick="abrirSetor('novos-negocios/index.html')">Novos Negócios</div>
    </section>

    <section class="hero">
        <div id="oraculo-container">
            <div id="frase-mae" class="frase-mae"></div>
            <div id="complemento-filho" class="complemento-filho"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="form-contato">
            <h3 style="color: var(--dourado-fosco); text-transform: uppercase; text-align: center; margin-bottom: 20px; font-weight: 300;">Cadastramento Área Restrita</h3>
            <form id="form_contato_principal" onsubmit="event.preventDefault(); enviarParaGoogle(this);">
                <input type="text" id="nome_contato" name="name" placeholder="Nome Completo" required>
                <input type="email" id="email_contato" name="email" placeholder="E-mail" required>
                <input type="tel" id="telefone_contato" name="phone" required>
                
                <button type="submit" id="btn_contato" style="background: var(--dourado-fosco); color: var(--azul-profundo); padding: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px;">OBTER CREDENCIAL</button>
            </form>
        </div>
    </footer>

    <div class="assinatura-dev">Desenvolvido por Terrae Aegis</div>

    <script>
        const phoneInput = document.querySelector("#telefone_contato");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            geoIpLookup: function(success, failure) {
                fetch("https://ipapi.co/json").then(res => res.json()).then(data => success(data.country_code)).catch(() => success("br"));
            },
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
        });

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzNxGsOqgRn8wgqnWDteyIIS3outdpPTbv-ce3cpC0mss2hHwgLfE527Ht-1dqxpUeu/exec';

        // LÓGICA DO ORÁCULO - ESTRUTURA MÃE E FILHO
        const dadosEstrategicos = [
            {
                mae: '"Rompa o ciclo da instabilidade sistêmica e garanta a autonomia absoluta do seu patrimônio."',
                filho: "Preservação de valor econômico operado fora das incertezas jurisdicionais locais."
            },
            {
                mae: '"Eleve seu legado a um patamar de proteção inalcançável pela voracidade estatal e pelas taxas abusivas do sistema financeiro."',
                filho: "Estruturação RWA em jurisdições de elite que neutraliza bloqueios e garante liquidez real."
            },
            {
                mae: '"Elimine a dependência bancária nacional com canais de crédito internacional a partir de 4% ao ano."',
                filho: "Otimização de ativos no Agro, Mineração e Indústria para gerar expansão autossustentável."
            },
            {
                mae: '"Consolide sua força como uma potência única e verticalizada no mercado."',
                filho: "Ambiente para incubação de projetos disruptivos e reinvestimento de excedentes em alta tecnologia."
            },
            {
                mae: '"Estabeleça a soberania absoluta da sua estrutura patrimonial e torne o seu legado eterno."',
                filho: "Blindagem estratégica que protege o passado e garante a liberdade das próximas gerações."
            }
        ];

        let indiceAtual = 0;
        const containerOraculo = document.getElementById('oraculo-container');
        const elMae = document.getElementById('frase-mae');
        const elFilho = document.getElementById('complemento-filho');

        function cicloOraculo() {
            elMae.innerText = dadosEstrategicos[indiceAtual].mae;
            elFilho.innerText = dadosEstrategicos[indiceAtual].filho;
            
            containerOraculo.classList.remove('animar-saida');
            containerOraculo.classList.add('animar-entrada');

            setTimeout(() => {
                containerOraculo.classList.remove('animar-entrada');
                containerOraculo.classList.add('animar-saida');

                setTimeout(() => {
                    containerOraculo.style.display = 'none';
                    indiceAtual = (indiceAtual + 1) % dadosEstrategicos.length;
                    setTimeout(cicloOraculo, 1500); 
                }, 2500); 
            }, 18000); 
        }

        // CADASTRO (OBTER CREDENCIAL)
        async function enviarParaGoogle(form) {
            const btn = form.querySelector('button');
            const emailBruto = document.getElementById('email_contato').value;
            const nomeBruto = document.getElementById('nome_contato').value;
            const telBruto = iti.getNumber();

            // FORMATAÇÃO PADRÃO TERRAE AEGIS
            const emailFormatado = emailBruto.trim().toLowerCase();
            const nomeFormatado = nomeBruto.toLowerCase().replace(/(?:^|\s)\S/g, a => a.toUpperCase());

            btn.innerText = "PROCESSANDO..."; btn.disabled = true;
            
            const payload = { acao: "cadastro", nome: nomeFormatado, email: emailFormatado, telefone: telBruto };
            
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                // PERSISTÊNCIA DE DADOS NO NAVEGADOR (O CARIMBO INICIAL)
                localStorage.setItem('terrae_user_nome', nomeFormatado);
                localStorage.setItem('terrae_user_email', emailFormatado);
                localStorage.setItem('terrae_user_tel', telBruto);
                
                alert(result.mensagem || "Protocolo Iniciado.");
                document.getElementById('email_restrito').value = emailFormatado;
                form.reset();
            } catch (e) { alert("Protocolo em processamento."); }
            
            btn.innerText = "OBTER CREDENCIAL"; btn.disabled = false;
        }

        async function recuperarToken() {
            const email = document.getElementById('email_restrito').value.trim().toLowerCase();
            if (!email) return alert("Insira seu e-mail no campo de login.");
            alert("Solicitação de segurança enviada para: " + email);
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ acao: "recuperacao", email: email }) });
        }
        
        async function validarTokenRestrito() {
            const email = document.getElementById('email_restrito').value.trim().toLowerCase();
            const tokenDigitado = document.getElementById('token_restrito').value.trim().toUpperCase();
            
            if (!email || !tokenDigitado) return alert("Preencha as credenciais.");
            
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ acao: "login", email: email, token: tokenDigitado }) });
                const result = await response.json();
                
                if (result.status === "sucesso") {
                    // ATUALIZA E-MAIL E TOKEN NA MEMÓRIA
                    localStorage.setItem('terrae_user_email', email);
                    localStorage.setItem('terrae_user_token', tokenDigitado);
                    
                    // Captura o nome do banco se não existir localmente para manter o padrão
                    if (result.nome) {
                        const nomeF = result.nome.toLowerCase().replace(/(?:^|\s)\S/g, a => a.toUpperCase());
                        localStorage.setItem('terrae_user_nome', nomeF);
                    }

                    window.location.href = "enquadramento/index.html";
                } else { alert(result.mensagem || "Token inválido."); }
            } catch (e) { alert("Erro na conexão."); }
        }

        const info = {
            'seguranca': "Sob a égide da invencibilidade, blindamos o patrimônio contra instabilidades globais.",
            'financas': "Proporcionamos total independência do sistema nacional para acelerar seus projetos.",
            'governanca': "Protocolos internacionais onde o investidor mantém o controle absoluto sobre seus bens."
        };

        function escrever(tipo, titulo) {
            const moldura = document.getElementById('moldura');
            const box = document.getElementById('escrita');
            document.getElementById('titulo-moldura').innerText = titulo;
            moldura.style.display = 'block';
            box.innerHTML = "";
            let i = 0; const texto = info[tipo];
            function type() { if (i < texto.length) { box.innerHTML += texto.charAt(i); i++; setTimeout(type, 30); } }
            type();
        }

        function fecharMoldura() { document.getElementById('moldura').style.display = 'none'; }
        function abrirSetor(url) { document.getElementById('iframeSetor').src = url; document.getElementById('molduraSetor').style.display = 'block'; }
        function fecharSetor() { document.getElementById('iframeSetor').src = ""; document.getElementById('molduraSetor').style.display = 'none'; }

        document.addEventListener('mousedown', function(e) {
            const mText = document.getElementById('moldura');
            const mSetor = document.getElementById('molduraSetor');
            if (mText.style.display === 'block' && !mText.contains(e.target) && !e.target.closest('.item-trindade-container')) fecharMoldura();
            if (mSetor.style.display === 'block' && !mSetor.contains(e.target) && !e.target.closest('.setor-card')) fecharSetor();
        });

        window.onload = cicloOraculo;
    </script>
</body>
</html>
