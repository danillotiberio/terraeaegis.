<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Direto | Terrae Aegis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-profundo: #0a192f; 
            --dourado-aegis: #C5B358; 
            --cinza-claro: #cfd8dc; 
            --branco-puro: #ffffff;
            --preto-de-realce: #000000;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--azul-profundo); /* Azul Soberano */
            color: var(--cinza-claro); /* Texto de Apoio */
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container-central { 
            width: 100%; max-width: 480px; 
            background-color: rgba(10, 25, 47, 0.9); /* Azul com opacidade */
            border: 1px solid var(--dourado-aegis); /* Borda Dourada */
            padding: 40px; box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h1 { 
            text-align: center; color: var(--dourado-aegis); 
            letter-spacing: 4px; font-size: 1.4rem; 
            text-transform: uppercase; font-weight: 700; margin: 0 0 30px 0; 
        }

        form { display: flex; flex-direction: column; }

        input, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.3); /* Preto translúcido para input */
            border: 1px solid rgba(197, 179, 88, 0.3); /* Borda Dourada sutil */
            padding: 18px; margin-bottom: 20px; 
            color: var(--branco-puro); /* Texto digitado em branco */
            font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 300; 
            box-sizing: border-box; outline: none; transition: 0.3s; 
        }
